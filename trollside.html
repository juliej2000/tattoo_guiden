<!doctype html>
<html lang="da">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tattoo Guiden</title>
    <meta name="robots" content="noindex" />
    <link rel="stylesheet" href="generelcss/generel.css" />
    <link rel="stylesheet" href="layoutcss/layout.css" />
    <link rel="icon" type="image/png" href="favicon/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="favicon/favicon.svg" />
    <link rel="shortcut icon" href="favicon/favicon.ico" />
    <link rel="icon" href="favicon/apple-touch-icon.png" sizes="180x180" />
    <link rel="manifest" href="favicon/web-app-manifest-192x192.png" />
    <link rel="manifest2" href="favicon/web-app-manifest-512x512.png" />

    <style>
      body {
        font-family: sans-serif;
        margin: 0;
      }

      /* screen reader text */
      .sr-only {
        position: absolute;
        left: -9999px;
      }

      .menu-button {
        font-size: 1.8rem;
        background: none;
        border: none;
        cursor: pointer;
        padding: 10px;
      }

      /* dialog */
      .menu {
        border: none;
        padding: 2rem;
        width: 250px;
        height: 100vh;
        margin: 0;
      }

      /* backdrop */
      .menu::backdrop {
        background: rgba(0, 0, 0, 0.4);
      }

      .menu ul {
        list-style: none;
        padding: 0;
      }

      .menu a {
        display: block;
        padding: 10px 0;
        text-decoration: none;
      }

      .close-button {
        background: none;
        border: none;
        font-size: 1.5rem;
        cursor: pointer;
      }
    </style>
    <style>
      main {
        background-image: url("Indholdsbilleder/logo/langbaggrund.webp");
        background-size: cover; /* fylder hele området */
        background-position: center; /* centrerer billedet */
        background-repeat: no-repeat;
        min-height: 100vh; /* gør main lige så høj som skærmen */
        color: white;
        padding: 40px;
      }
    </style>
  </head>
  <body>
    <header class="header">
      <button class="menu-button" aria-controls="menu-dialog">
        ☰
        <span class="sr-only">Åbn menu</span>
      </button>
      <dialog id="menu-dialog" class="menu">
        <button class="close-button">✕</button>

        <nav>
          <ul>
            <li><a href="forside.html">Forside</a></li>
            <li><a href="stilarter.html">Stilarter</a></li>
            <li><a href="aftercare.html">Aftercare </a></li>
            <li><a href="process.html">Process</a></li>
          </ul>
        </nav>
      </dialog>
      <h1 class="headeroverskrift">Tattoo Guiden</h1>
      <img class="Logo" src="Indholdsbilleder/Prototype/apple-touch-icon.webp" alt="logo" />
    </header>
    <main>
      <div class="cirkel"><p>Øv... du er ikke gammel nok til en tatovering. Vi ses når du bliver 18 år!</p></div>
    </main>
    <footer><p>&copy; 2026 Tattoo Guiden. Alle rettigheder forbeholdes Julie Jacobsen.</p></footer>
    <script>
      const dialog = document.querySelector("#menu-dialog");
      const openBtn = document.querySelector(".menu-button");
      const closeBtn = document.querySelector(".close-button");

      openBtn.addEventListener("click", () => dialog.showModal());
      closeBtn.addEventListener("click", () => dialog.close());

      dialog.querySelectorAll("a").forEach((link) => link.addEventListener("click", () => dialog.close()));
    </script>
  </body>
</html>
